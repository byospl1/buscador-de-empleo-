name: Buscador de empleo diario

on:
  schedule:
    # GitHub Actions usa UTC. Tijuana = UTC-8 (invierno) / UTC-7 (verano).
    # Disparamos a 15:00 y 16:00 UTC; el script solo actúa cuando en
    # Tijuana son las 8:00am, así funciona todo el año con o sin horario de verano.
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:   # botón manual para probarlo cuando quieras

permissions:
  contents: write        # para guardar vistos.json entre corridas

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar buscador
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python buscar_empleo.py

      - name: Guardar vacantes vistas
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add vistos.json
          git commit -m "update vistos" || echo "sin cambios"
          git push || echo "nada que empujar"

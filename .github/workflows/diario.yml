name: Buscador de empleo diario

on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar buscador
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FORZAR: "1"
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python buscar_empleo.py
      - name: Guardar vacantes vistas
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add vistos.json
          git commit -m "update vistos" || echo "sin cambios"
          git push || echo "nada que empujar"
